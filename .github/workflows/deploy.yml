      - name: Compute production deployment fingerprint
        id: prod-fingerprint
        env:
          PROD_ALLOWED_ORIGINS: ${{ secrets.PROD_ALLOWED_ORIGINS }}
          PROD_AUTH_BYPASS: ${{ secrets.PROD_AUTH_BYPASS }}
          PROD_MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          PROD_REFRESH_TOKEN_MAX_AGE_SEC: ${{ secrets.PROD_REFRESH_TOKEN_MAX_AGE_SEC }}
          PROD_REFRESH_COOKIE_SAME_SITE: ${{ secrets.PROD_REFRESH_COOKIE_SAME_SITE }}
          PROD_REFRESH_RATE_LIMIT_LIMIT: ${{ secrets.PROD_REFRESH_RATE_LIMIT_LIMIT }}
          PROD_REFRESH_RATE_LIMIT_WINDOW_SEC: ${{ secrets.PROD_REFRESH_RATE_LIMIT_WINDOW_SEC }}
          PROD_AUTH_SMTP_HOST: ${{ secrets.PROD_AUTH_SMTP_HOST }}
          PROD_AUTH_SMTP_PORT: ${{ secrets.PROD_AUTH_SMTP_PORT }}
          PROD_AUTH_SMTP_USER: ${{ secrets.PROD_AUTH_SMTP_USER }}
          PROD_AUTH_SMTP_PASS: ${{ secrets.PROD_AUTH_SMTP_PASS }}
          PROD_AUTH_SMTP_FROM: ${{ secrets.PROD_AUTH_SMTP_FROM }}
