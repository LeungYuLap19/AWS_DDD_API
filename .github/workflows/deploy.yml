            CommerceCuttlyApiKey="${{ secrets.PROD_CUTTLY_API_KEY }}" \
            SfCustomerCode="${{ secrets.PROD_SF_CUSTOMER_CODE }}" \
            SfProductionCheckCode="${{ secrets.PROD_SF_PRODUCTION_CHECK_CODE }}" \
            SfSandboxCheckCode="${{ secrets.PROD_SF_SANDBOX_CHECK_CODE }}" \
            SfAddressApiKey="${{ secrets.PROD_SF_ADDRESS_API_KEY }}" \
            LogisticsSmtpHost="${{ secrets.PROD_LOGISTICS_SMTP_HOST }}" \
            LogisticsSmtpPort="${{ secrets.PROD_LOGISTICS_SMTP_PORT }}" \
            LogisticsSmtpUser="${{ secrets.PROD_LOGISTICS_SMTP_USER }}" \
            LogisticsSmtpPass="${{ secrets.PROD_LOGISTICS_SMTP_PASS }}" \
            LogisticsSmtpFrom="${{ secrets.PROD_LOGISTICS_SMTP_FROM }}"

      - name: Verify production alias sync
        run: node script/verify-lambda-alias-sync.cjs --template template.yaml --project aws-ddd-api --stage production --alias production

      - name: Smoke test production
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name aws-ddd-api-production \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          curl --fail --silent --show-error "$API_URL/pipeline/smoke"
