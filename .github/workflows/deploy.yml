name: Deploy AWS DDD API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy production after development succeeds
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Validate template
        run: sam validate --template-file template.yaml

      - name: Build app
        run: npm run build

      - name: Deploy development
        run: sam deploy --config-env default

      - name: Smoke test development
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name aws-ddd-api-development \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          curl --fail --silent --show-error "$API_URL/pipeline/smoke"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    needs: deploy-development
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Validate template
        run: sam validate --template-file template.yaml

      - name: Build app
        run: npm run build

      - name: Deploy production
        run: sam deploy --config-env production

      - name: Smoke test production
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name aws-ddd-api-production \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          curl --fail --silent --show-error "$API_URL/pipeline/smoke"
