name: Deploy AWS DDD API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: input gates an optional manual production deploy; removing it would break the production conditional
    inputs:
      deploy_production:
        description: Deploy production after development succeeds
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Validate template
        run: sam validate --template-file template.yaml

      - name: Build app
        run: npm run build

      - name: Compute development deployment fingerprint
        id: dev-fingerprint
        env:
          DEV_ALLOWED_ORIGINS: ${{ secrets.DEV_ALLOWED_ORIGINS }}
          DEV_AUTH_BYPASS: ${{ secrets.DEV_AUTH_BYPASS }}
          DEV_MONGODB_URI: ${{ secrets.DEV_MONGODB_URI }}
          DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          DEV_REFRESH_TOKEN_MAX_AGE_SEC: ${{ secrets.DEV_REFRESH_TOKEN_MAX_AGE_SEC }}
          DEV_REFRESH_COOKIE_SAME_SITE: ${{ secrets.DEV_REFRESH_COOKIE_SAME_SITE }}
          DEV_REFRESH_RATE_LIMIT_LIMIT: ${{ secrets.DEV_REFRESH_RATE_LIMIT_LIMIT }}
          DEV_REFRESH_RATE_LIMIT_WINDOW_SEC: ${{ secrets.DEV_REFRESH_RATE_LIMIT_WINDOW_SEC }}
          DEV_AUTH_SMTP_HOST: ${{ secrets.DEV_AUTH_SMTP_HOST }}
          DEV_AUTH_SMTP_PORT: ${{ secrets.DEV_AUTH_SMTP_PORT }}
          DEV_AUTH_SMTP_USER: ${{ secrets.DEV_AUTH_SMTP_USER }}
          DEV_AUTH_SMTP_PASS: ${{ secrets.DEV_AUTH_SMTP_PASS }}
          DEV_AUTH_SMTP_FROM: ${{ secrets.DEV_AUTH_SMTP_FROM }}
          DEV_TWILIO_ACCOUNT_SID: ${{ secrets.DEV_TWILIO_ACCOUNT_SID }}
          DEV_TWILIO_AUTH_TOKEN: ${{ secrets.DEV_TWILIO_AUTH_TOKEN }}
          DEV_TWILIO_VERIFY_SERVICE_SID: ${{ secrets.DEV_TWILIO_VERIFY_SERVICE_SID }}
          DEV_S3_BUCKET_NAME: ${{ secrets.DEV_S3_BUCKET_NAME }}
          DEV_S3_BUCKET_BASE_URL: ${{ secrets.DEV_S3_BUCKET_BASE_URL }}
          DEV_S3_BUCKET_REGION: ${{ secrets.DEV_S3_BUCKET_REGION }}
          DEV_ADOPTION_MONGODB_URI: ${{ secrets.DEV_ADOPTION_MONGODB_URI }}
          DEV_PET_ANALYSIS_VM_PUBLIC_IP: ${{ secrets.DEV_PET_ANALYSIS_VM_PUBLIC_IP }}
          DEV_PET_ANALYSIS_DOCKER_IMAGE: ${{ secrets.DEV_PET_ANALYSIS_DOCKER_IMAGE }}
          DEV_PET_ANALYSIS_HEATMAP: ${{ secrets.DEV_PET_ANALYSIS_HEATMAP }}
          DEV_PET_ANALYSIS_VM_BREED_PUBLIC_IP: ${{ secrets.DEV_PET_ANALYSIS_VM_BREED_PUBLIC_IP }}
          DEV_PET_ANALYSIS_BREED_DOCKER_IMAGE: ${{ secrets.DEV_PET_ANALYSIS_BREED_DOCKER_IMAGE }}
          DEV_BUSINESS_MONGODB_URI: ${{ secrets.DEV_BUSINESS_MONGODB_URI }}
          DEV_ML_INFERENCE_IMAGE_URI: ${{ secrets.DEV_ML_INFERENCE_IMAGE_URI }}
          DEV_FACEID_API: ${{ secrets.DEV_FACEID_API }}
          DEV_COMMERCE_SMTP_HOST: ${{ secrets.DEV_COMMERCE_SMTP_HOST }}
          DEV_COMMERCE_SMTP_PORT: ${{ secrets.DEV_COMMERCE_SMTP_PORT }}
          DEV_COMMERCE_SMTP_USER: ${{ secrets.DEV_COMMERCE_SMTP_USER }}
          DEV_COMMERCE_SMTP_PASS: ${{ secrets.DEV_COMMERCE_SMTP_PASS }}
          DEV_COMMERCE_SMTP_FROM: ${{ secrets.DEV_COMMERCE_SMTP_FROM }}
          DEV_WHATSAPP_BEARER_TOKEN: ${{ secrets.DEV_WHATSAPP_BEARER_TOKEN }}
          DEV_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.DEV_WHATSAPP_PHONE_NUMBER_ID }}
          DEV_CUTTLY_API_KEY: ${{ secrets.DEV_CUTTLY_API_KEY }}
          DEV_SF_CUSTOMER_CODE: ${{ secrets.DEV_SF_CUSTOMER_CODE }}
          DEV_SF_PRODUCTION_CHECK_CODE: ${{ secrets.DEV_SF_PRODUCTION_CHECK_CODE }}
          DEV_SF_SANDBOX_CHECK_CODE: ${{ secrets.DEV_SF_SANDBOX_CHECK_CODE }}
          DEV_SF_ADDRESS_API_KEY: ${{ secrets.DEV_SF_ADDRESS_API_KEY }}
          DEV_LOGISTICS_SMTP_HOST: ${{ secrets.DEV_LOGISTICS_SMTP_HOST }}
          DEV_LOGISTICS_SMTP_PORT: ${{ secrets.DEV_LOGISTICS_SMTP_PORT }}
          DEV_LOGISTICS_SMTP_USER: ${{ secrets.DEV_LOGISTICS_SMTP_USER }}
          DEV_LOGISTICS_SMTP_PASS: ${{ secrets.DEV_LOGISTICS_SMTP_PASS }}
          DEV_LOGISTICS_SMTP_FROM: ${{ secrets.DEV_LOGISTICS_SMTP_FROM }}
        run: |
          FINGERPRINT=$(
            printf '%s\n' \
              "GitSha=${GITHUB_SHA}" \
              "StageName=development" \
              "ProjectName=aws-ddd-api" \
              "LambdaAliasName=development" \
              "ConfigNamespace=/petpetclub/aws-ddd-api/development" \
              "AllowedOrigins=${DEV_ALLOWED_ORIGINS}" \
              "AuthBypass=${DEV_AUTH_BYPASS}" \
              "MongoDbUri=${DEV_MONGODB_URI}" \
              "JwtSecret=${DEV_JWT_SECRET}" \
              "RefreshTokenMaxAgeSec=${DEV_REFRESH_TOKEN_MAX_AGE_SEC}" \
              "RefreshCookieSameSite=${DEV_REFRESH_COOKIE_SAME_SITE}" \
              "RefreshRateLimitLimit=${DEV_REFRESH_RATE_LIMIT_LIMIT}" \
              "RefreshRateLimitWindowSec=${DEV_REFRESH_RATE_LIMIT_WINDOW_SEC}" \
              "AuthSmtpHost=${DEV_AUTH_SMTP_HOST}" \
              "AuthSmtpPort=${DEV_AUTH_SMTP_PORT}" \
              "AuthSmtpUser=${DEV_AUTH_SMTP_USER}" \
              "AuthSmtpPass=${DEV_AUTH_SMTP_PASS}" \
              "AuthSmtpFrom=${DEV_AUTH_SMTP_FROM}" \
              "TwilioAccountSid=${DEV_TWILIO_ACCOUNT_SID}" \
              "TwilioAuthToken=${DEV_TWILIO_AUTH_TOKEN}" \
              "TwilioVerifyServiceSid=${DEV_TWILIO_VERIFY_SERVICE_SID}" \
              "S3BucketName=${DEV_S3_BUCKET_NAME}" \
              "S3BucketBaseUrl=${DEV_S3_BUCKET_BASE_URL}" \
              "S3BucketRegion=${DEV_S3_BUCKET_REGION}" \
              "AdoptionMongoDbUri=${DEV_ADOPTION_MONGODB_URI}" \
              "PetAnalysisVmPublicIp=${DEV_PET_ANALYSIS_VM_PUBLIC_IP}" \
              "PetAnalysisDockerImage=${DEV_PET_ANALYSIS_DOCKER_IMAGE}" \
              "PetAnalysisHeatmap=${DEV_PET_ANALYSIS_HEATMAP}" \
              "PetAnalysisVmBreedPublicIp=${DEV_PET_ANALYSIS_VM_BREED_PUBLIC_IP}" \
              "PetAnalysisBreedDockerImage=${DEV_PET_ANALYSIS_BREED_DOCKER_IMAGE}" \
              "BusinessMongoDbUri=${DEV_BUSINESS_MONGODB_URI}" \
              "MlInferenceImageUri=${DEV_ML_INFERENCE_IMAGE_URI}" \
              "FaceIdApi=${DEV_FACEID_API}" \
              "CommerceSmtpHost=${DEV_COMMERCE_SMTP_HOST}" \
              "CommerceSmtpPort=${DEV_COMMERCE_SMTP_PORT}" \
              "CommerceSmtpUser=${DEV_COMMERCE_SMTP_USER}" \
              "CommerceSmtpPass=${DEV_COMMERCE_SMTP_PASS}" \
              "CommerceSmtpFrom=${DEV_COMMERCE_SMTP_FROM}" \
              "CommerceWhatsappBearerToken=${DEV_WHATSAPP_BEARER_TOKEN}" \
              "CommerceWhatsappPhoneNumberId=${DEV_WHATSAPP_PHONE_NUMBER_ID}" \
              "CommerceCuttlyApiKey=${DEV_CUTTLY_API_KEY}" \
              "SfCustomerCode=${DEV_SF_CUSTOMER_CODE}" \
              "SfProductionCheckCode=${DEV_SF_PRODUCTION_CHECK_CODE}" \
              "SfSandboxCheckCode=${DEV_SF_SANDBOX_CHECK_CODE}" \
              "SfAddressApiKey=${DEV_SF_ADDRESS_API_KEY}" \
              "LogisticsSmtpHost=${DEV_LOGISTICS_SMTP_HOST}" \
              "LogisticsSmtpPort=${DEV_LOGISTICS_SMTP_PORT}" \
              "LogisticsSmtpUser=${DEV_LOGISTICS_SMTP_USER}" \
              "LogisticsSmtpPass=${DEV_LOGISTICS_SMTP_PASS}" \
              "LogisticsSmtpFrom=${DEV_LOGISTICS_SMTP_FROM}" \
            | shasum -a 256 | awk '{print $1}'
          )
          echo "value=$FINGERPRINT" >> "$GITHUB_OUTPUT"

      - name: Deploy development
        run: |
          sam deploy --config-env default --resolve-image-repos --parameter-overrides \
            StageName=development \
            ProjectName=aws-ddd-api \
            LambdaAliasName=development \
            DeploymentFingerprint="${{ steps.dev-fingerprint.outputs.value }}" \
            ConfigNamespace=/petpetclub/aws-ddd-api/development \
            AllowedOrigins="${{ secrets.DEV_ALLOWED_ORIGINS }}" \
            AuthBypass="${{ secrets.DEV_AUTH_BYPASS }}" \
            MongoDbUri="${{ secrets.DEV_MONGODB_URI }}" \
            JwtSecret="${{ secrets.DEV_JWT_SECRET }}" \
            RefreshTokenMaxAgeSec="${{ secrets.DEV_REFRESH_TOKEN_MAX_AGE_SEC }}" \
            RefreshCookieSameSite="${{ secrets.DEV_REFRESH_COOKIE_SAME_SITE }}" \
            RefreshRateLimitLimit="${{ secrets.DEV_REFRESH_RATE_LIMIT_LIMIT }}" \
            RefreshRateLimitWindowSec="${{ secrets.DEV_REFRESH_RATE_LIMIT_WINDOW_SEC }}" \
            AuthSmtpHost="${{ secrets.DEV_AUTH_SMTP_HOST }}" \
            AuthSmtpPort="${{ secrets.DEV_AUTH_SMTP_PORT }}" \
            AuthSmtpUser="${{ secrets.DEV_AUTH_SMTP_USER }}" \
            AuthSmtpPass="${{ secrets.DEV_AUTH_SMTP_PASS }}" \
            AuthSmtpFrom="${{ secrets.DEV_AUTH_SMTP_FROM }}" \
            TwilioAccountSid="${{ secrets.DEV_TWILIO_ACCOUNT_SID }}" \
            TwilioAuthToken="${{ secrets.DEV_TWILIO_AUTH_TOKEN }}" \
            TwilioVerifyServiceSid="${{ secrets.DEV_TWILIO_VERIFY_SERVICE_SID }}" \
            S3BucketName="${{ secrets.DEV_S3_BUCKET_NAME }}" \
            S3BucketBaseUrl="${{ secrets.DEV_S3_BUCKET_BASE_URL }}" \
            S3BucketRegion="${{ secrets.DEV_S3_BUCKET_REGION }}" \
            AdoptionMongoDbUri="${{ secrets.DEV_ADOPTION_MONGODB_URI }}" \
            PetAnalysisVmPublicIp="${{ secrets.DEV_PET_ANALYSIS_VM_PUBLIC_IP }}" \
            PetAnalysisDockerImage="${{ secrets.DEV_PET_ANALYSIS_DOCKER_IMAGE }}" \
            PetAnalysisHeatmap="${{ secrets.DEV_PET_ANALYSIS_HEATMAP }}" \
            PetAnalysisVmBreedPublicIp="${{ secrets.DEV_PET_ANALYSIS_VM_BREED_PUBLIC_IP }}" \
            PetAnalysisBreedDockerImage="${{ secrets.DEV_PET_ANALYSIS_BREED_DOCKER_IMAGE }}" \
            MlInferenceImageUri="${{ secrets.DEV_ML_INFERENCE_IMAGE_URI }}" \
            CommerceSmtpHost="${{ secrets.DEV_COMMERCE_SMTP_HOST }}" \
            CommerceSmtpPort="${{ secrets.DEV_COMMERCE_SMTP_PORT }}" \
            CommerceSmtpUser="${{ secrets.DEV_COMMERCE_SMTP_USER }}" \
            CommerceSmtpPass="${{ secrets.DEV_COMMERCE_SMTP_PASS }}" \
            CommerceSmtpFrom="${{ secrets.DEV_COMMERCE_SMTP_FROM }}" \
            CommerceWhatsappBearerToken="${{ secrets.DEV_WHATSAPP_BEARER_TOKEN }}" \
            CommerceWhatsappPhoneNumberId="${{ secrets.DEV_WHATSAPP_PHONE_NUMBER_ID }}" \
            CommerceCuttlyApiKey="${{ secrets.DEV_CUTTLY_API_KEY }}" \
            SfCustomerCode="${{ secrets.DEV_SF_CUSTOMER_CODE }}" \
            SfProductionCheckCode="${{ secrets.DEV_SF_PRODUCTION_CHECK_CODE }}" \
            SfSandboxCheckCode="${{ secrets.DEV_SF_SANDBOX_CHECK_CODE }}" \
            SfAddressApiKey="${{ secrets.DEV_SF_ADDRESS_API_KEY }}" \
            LogisticsSmtpHost="${{ secrets.DEV_LOGISTICS_SMTP_HOST }}" \
            LogisticsSmtpPort="${{ secrets.DEV_LOGISTICS_SMTP_PORT }}" \
            LogisticsSmtpUser="${{ secrets.DEV_LOGISTICS_SMTP_USER }}" \
            LogisticsSmtpPass="${{ secrets.DEV_LOGISTICS_SMTP_PASS }}" \
            LogisticsSmtpFrom="${{ secrets.DEV_LOGISTICS_SMTP_FROM }}"

      - name: Verify development alias sync
        run: node script/verify-lambda-alias-sync.cjs --template template.yaml --project aws-ddd-api --stage development --alias development

      - name: Smoke test development
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name aws-ddd-api-development \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          curl --fail --silent --show-error "$API_URL/pipeline/smoke"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    needs: deploy-development
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
