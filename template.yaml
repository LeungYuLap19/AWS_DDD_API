# yaml-language-server: $schema=https://raw.githubusercontent.com/aws/serverless-application-model/main/samtranslator/schema/schema.json
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS DDD API base framework with shared layer, REST proxy routes, Lambda authorizer, request validation, aliases, IAM roles, and config/secret wiring.

Parameters:
  ProjectName:
    Type: String
    Default: aws-ddd-api
    AllowedPattern: '[a-zA-Z0-9-]+'
  StageName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-]+'
  LambdaAliasName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-_]+'
  ConfigNamespace:
    Type: String
    Default: /petpetclub/aws-ddd-api/development
  AllowedOrigins:
    Type: String
    Default: '*'
  LambdaSubnetIds:
    Type: CommaDelimitedList
    Default: subnet-0e83ebdff39d08623,subnet-07775337a6470eee2
  LambdaSecurityGroupIds:
    Type: CommaDelimitedList
    Default: sg-0fd68782d1963c6a3
  ExistingApiKeyId:
    Type: String
    Default: 44tq771b0m
    Description: Existing API Gateway API key ID to attach to this API usage plan.
  AuthBypass:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  MongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
  JwtSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: JWT secret used by the Lambda authorizer when no SSM parameter path is provided.
  RefreshTokenMaxAgeSec:
    Type: String
    Default: '1209600'
  RefreshRateLimitLimit:
    Type: String
    Default: '20'
  RefreshRateLimitWindowSec:
    Type: String
    Default: '300'
  AuthSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpPort:
    Type: String
    Default: '465'
  AuthSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpFrom:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAccountSid:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAuthToken:
    Type: String
    Default: ''
    NoEcho: true
  TwilioVerifyServiceSid:
    Type: String
    Default: ''
    NoEcho: true
  S3BucketName:
    Type: String
    Default: ''
  S3BucketBaseUrl:
    Type: String
    Default: ''
  S3BucketRegion:
    Type: String
    Default: ''
  AdoptionMongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
  PetAnalysisVmPublicIp:
    Type: String
    Default: ''
  PetAnalysisDockerImage:
    Type: String
    Default: ''
  PetAnalysisHeatmap:
    Type: String
    Default: ''
  PetAnalysisVmBreedPublicIp:
    Type: String
    Default: ''
  PetAnalysisBreedDockerImage:
    Type: String
    Default: ''
  BusinessMongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
  FaceIdApi:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpPort:
    Type: String
    Default: '465'
  CommerceSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpFrom:
    Type: String
    Default: ''
    NoEcho: true
  WhatsappBearerToken:
    Type: String
    Default: ''
    NoEcho: true
  WhatsappPhoneNumberId:
    Type: String
    Default: ''
    NoEcho: true
  CuttlyApiKey:
    Type: String
    Default: ''
    NoEcho: true
  SfCustomerCode:
    Type: String
    Default: ''
    NoEcho: true
  SfProductionCheckCode:
    Type: String
    Default: ''
    NoEcho: true
  SfSandboxCheckCode:
    Type: String
    Default: ''
    NoEcho: true
  SfAddressApiKey:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpPort:
    Type: String
    Default: '465'
  LogisticsSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpFrom:
    Type: String
    Default: ''
