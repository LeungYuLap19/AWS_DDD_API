# yaml-language-server: $schema=https://raw.githubusercontent.com/aws/serverless-application-model/main/samtranslator/schema/schema.json
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS DDD API base framework with shared layer, REST proxy routes, Lambda authorizer, request validation, aliases, IAM roles, and config/secret wiring.

Parameters:
  ProjectName:
    Type: String
    Default: aws-ddd-api
    AllowedPattern: '[a-zA-Z0-9-]+'
  StageName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-]+'
  LambdaAliasName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-_]+'
  ConfigNamespace:
    Type: String
    Default: /aws-ddd-api/development
  AllowedOrigins:
    Type: String
    Default: http://localhost:3000
  ExistingApiKeyId:
    Type: String
    Default: 44tq771b0m
    Description: Existing API Gateway API key ID to attach to this API usage plan.
  JwtSecretParameterPath:
    Type: String
    Default: ''
    Description: Optional SSM SecureString path for JWT_SECRET. Leave blank to use the local-safe default.
  AuthBypassParameterPath:
    Type: String
    Default: ''
    Description: Optional SSM SecureString path for AUTH_BYPASS. Leave blank to use the local-safe default.

Conditions:
  HasJwtSecretParameterPath: !Not [!Equals [!Ref JwtSecretParameterPath, '']]
  HasAuthBypassParameterPath: !Not [!Equals [!Ref AuthBypassParameterPath, '']]

Globals: # shared default settings applied to all resources of a given type, unless a resource overrides them.
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        STAGE_NAME: !Ref StageName
        LAMBDA_ALIAS_NAME: !Ref LambdaAliasName
        CONFIG_NAMESPACE: !Ref ConfigNamespace
        AUTH_BYPASS: !If
          - HasAuthBypassParameterPath
          - !Sub '{{resolve:ssm-secure:${AuthBypassParameterPath}}}'
          - 'false'
        JWT_SECRET: !If
          - HasJwtSecretParameterPath
          - !Sub '{{resolve:ssm-secure:${JwtSecretParameterPath}}}'
          - 'local-dev-jwt-secret'

Resources:
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${ProjectName}-${StageName}'
      StageName: !Ref StageName
      EndpointConfiguration: REGIONAL
      ApiKeySourceType: HEADER
      Cors: # it will handle OPTIONS automatically, no OPTIONS needed in every path
        AllowOrigin: !Sub "'${AllowedOrigins}'"
        AllowHeaders: "'Content-Type,Authorization,X-Request-Id'"
        AllowMethods: "'OPTIONS,GET,POST,PUT,PATCH,DELETE'"
      Models: # request/response schemas, validates the request body before Lambda runs
        CreateWidgetRequest:
          type: object # body must be a JSON object
          additionalProperties: false # no extra unknown fields allowed
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 100
            description:
              type: string
              maxLength: 500
        GenericJsonObjectRequest:
          type: object
          additionalProperties: true
      Auth: # configure authorization behavior for the API or for a specific route
        ApiKeyRequired: true
        AddApiKeyRequiredToCorsPreflight: false
        DefaultAuthorizer: DddTokenAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          DddTokenAuthorizer:
            FunctionArn: !GetAtt RequestAuthorizerFunction.Arn # Amazon Resource Name
            Identity:
              Header: Authorization
              ValidationExpression: '^Bearer .+$'
              ReauthorizeEvery: 0

  SharedRuntimeLayer: # the Lambda Layer resource you defined in the template
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${ProjectName}-${StageName}-shared-runtime'
      ContentUri: dist/layers/shared-runtime/
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Retain

  RestApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - RestApiStage
    Properties:
      UsagePlanName: !Sub '${ProjectName}-${StageName}-usage-plan'
      Description: !Sub 'Usage plan for ${ProjectName}-${StageName}'
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref StageName

  RestApiUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ExistingApiKeyId
      KeyType: API_KEY
      UsagePlanId: !Ref RestApiUsagePlan

  SharedFunctionRole: # default app Lambda permissions, 
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole # basic Lambda logging
      Policies:
        - PolicyName: shared-config-read # reading config/secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter 
                  - ssm:GetParameters
                  - secretsmanager:GetSecretValue
                Resource: '*'

  AuthorizerFunctionRole: # the IAM role for the authorizer Lambda only - RequestAuthorizerFunction
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: authorizer-config-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - secretsmanager:GetSecretValue
                Resource: '*'

  RequestAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-request-authorizer'
      CodeUri: dist/functions/request-authorizer/
      Handler: index.handler
      Role: !GetAtt AuthorizerFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName

  PipelineSmokeFunction: # CI/CD smoke test example
    # - proves deployment pipeline works
    # - intentionally tiny and low-risk
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-pipeline-smoke'
      CodeUri: dist/functions/pipeline-smoke/
      Handler: index.handler
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      Events:
        PipelineSmokeRootGET:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: GET
            Auth:
              Authorizer: NONE
        PipelineSmokeRootDELETE:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: DELETE
            Auth:
              Authorizer: NONE
        PipelineSmokeRootPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPUT:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PUT
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPATCH:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PATCH
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true

