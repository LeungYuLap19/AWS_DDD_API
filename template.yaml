# yaml-language-server: $schema=https://raw.githubusercontent.com/aws/serverless-application-model/main/samtranslator/schema/schema.json
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS DDD API base framework with shared layer, REST proxy routes, Lambda authorizer, request validation, aliases, IAM roles, and config/secret wiring.

Parameters:
  ProjectName:
    Type: String
    Default: aws-ddd-api
    AllowedPattern: '[a-zA-Z0-9-]+'
  StageName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-]+'
  LambdaAliasName:
    Type: String
    Default: development
    AllowedPattern: '[a-zA-Z0-9-_]+'
  ConfigNamespace:
    Type: String
    Default: /petpetclub/aws-ddd-api/development
  AllowedOrigins:
    Type: String
    Default: '*'
  LambdaSubnetIds:
    Type: CommaDelimitedList
    Default: subnet-0e83ebdff39d08623,subnet-07775337a6470eee2
  LambdaSecurityGroupIds:
    Type: CommaDelimitedList
    Default: sg-0fd68782d1963c6a3
  ExistingApiKeyId:
    Type: String
    Default: 44tq771b0m
    Description: Existing API Gateway API key ID to attach to this API usage plan.
  AuthBypass:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  MongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
  JwtSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: JWT secret used by the Lambda authorizer when no SSM parameter path is provided.
  RefreshTokenMaxAgeSec:
    Type: String
    Default: '1209600'
  RefreshRateLimitLimit:
    Type: String
    Default: '20'
  RefreshRateLimitWindowSec:
    Type: String
    Default: '300'
  RefreshCookieSameSite:
    Type: String
    Default: Strict
    AllowedValues:
      - Strict
      - Lax
      - None
  AuthSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpPort:
    Type: String
    Default: '465'
  AuthSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  AuthSmtpFrom:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAccountSid:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAuthToken:
    Type: String
    Default: ''
    NoEcho: true
  TwilioVerifyServiceSid:
    Type: String
    Default: ''
    NoEcho: true
  S3BucketName:
    Type: String
    Default: ''
  S3BucketBaseUrl:
    Type: String
    Default: ''
  S3BucketRegion:
    Type: String
    Default: ''
  AdoptionMongoDbUri:
    Type: String
    Default: ''
    NoEcho: true
  PetAnalysisVmPublicIp:
    Type: String
    Default: ''
  PetAnalysisDockerImage:
    Type: String
    Default: ''
  PetAnalysisHeatmap:
    Type: String
    Default: ''
  PetAnalysisVmBreedPublicIp:
    Type: String
    Default: ''
  PetAnalysisBreedDockerImage:
    Type: String
    Default: ''
  CommerceSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpPort:
    Type: String
    Default: '465'
  CommerceSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  CommerceSmtpFrom:
    Type: String
    Default: ''
    NoEcho: true
  CommerceWhatsappBearerToken:
    Type: String
    Default: ''
    NoEcho: true
  CommerceWhatsappPhoneNumberId:
    Type: String
    Default: ''
    NoEcho: true
  CommerceCuttlyApiKey:
    Type: String
    Default: ''
    NoEcho: true
  SfCustomerCode:
    Type: String
    Default: ''
    NoEcho: true
  SfProductionCheckCode:
    Type: String
    Default: ''
    NoEcho: true
  SfSandboxCheckCode:
    Type: String
    Default: ''
    NoEcho: true
  SfAddressApiKey:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpHost:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpPort:
    Type: String
    Default: '465'
  LogisticsSmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  LogisticsSmtpFrom:
    Type: String
    Default: ''
    NoEcho: true
  LambdaReservedConcurrency:
    Type: Number
    Default: 45
    Description: Reserved concurrent execution limit per Lambda function. Default 45 keeps headroom for the account-wide unreserved concurrency floor when this stack adds new functions.
  DeploymentFingerprint:
    Type: String
    Default: ''
    Description: Fingerprint of the effective deployment config used to force alias version publication when config-only values change.
  MlInferenceImageUri:
    Type: String
    Default: ''
    Description: ECR image URI for ml-inference Lambda container image. Leave empty to skip creating the function.

Conditions:
  HasMlInferenceImageUri: !Not
    - !Equals
      - !Ref MlInferenceImageUri
      - ''

Globals: # shared default settings applied to all resources of a given type, unless a resource overrides them.
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64 # Graviton2: ~20% cheaper compute, faster cold start vs x86_64
    Timeout: 10
    MemorySize: 256
    VpcConfig:
      SecurityGroupIds: !Ref LambdaSecurityGroupIds
      SubnetIds: !Ref LambdaSubnetIds
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        STAGE_NAME: !Ref StageName
        LAMBDA_ALIAS_NAME: !Ref LambdaAliasName
        CONFIG_NAMESPACE: !Ref ConfigNamespace
        NODE_ENV: !Ref StageName
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        MONGODB_URI: !Ref MongoDbUri
        AUTH_BYPASS: !Ref AuthBypass
        JWT_SECRET: !Ref JwtSecret
    DeadLetterQueue:
      Type: SQS
      TargetArn: !GetAtt LambdaDeadLetterQueue.Arn
Resources:
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${ProjectName}-${StageName}'
      RetentionInDays: 30

  LambdaDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
      MessageRetentionPeriod: 1209600

  RestApi:
    Type: AWS::Serverless::Api
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_120
            comment: "API Gateway stage caching adds per-request cost; not required for this project"
          - id: CKV_AWS_173
            comment: "Lambda env vars encrypted with AWS-managed key; custom KMS adds cost"
    Properties:
      Name: !Sub '${ProjectName}-${StageName}'
      StageName: !Ref StageName
      EndpointConfiguration: REGIONAL
      ApiKeySourceType: HEADER
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: !Sub |
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}
      BinaryMediaTypes:
        - 'multipart/form-data' # causes API GW to base64-encode multipart bodies (consistent 33% overhead) instead of UTF-8-encoding binary content (variable up to ~1.5x overhead), making the Lambda 6 MB invocation limit predictable
      Models: # request/response schemas, validates the request body before Lambda runs
        CreateWidgetRequest:
          type: object # body must be a JSON object
          additionalProperties: false # no extra unknown fields allowed
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 100
            description:
              type: string
              maxLength: 500
        GenericJsonObjectRequest:
          type: object
          additionalProperties: true
      Auth: # configure authorization behavior for the API or for a specific route
        ApiKeyRequired: true
        AddApiKeyRequiredToCorsPreflight: false
        DefaultAuthorizer: DddTokenAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          DddTokenAuthorizer:
            FunctionArn: !GetAtt RequestAuthorizerFunction.Arn # Amazon Resource Name
            Identity:
              Header: Authorization
              ValidationExpression: '^Bearer .+$'
              ReauthorizeEvery: 0

  RestApiDefault4xxGatewayResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref RestApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: method.request.header.Origin
        gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Request-Id,x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,PATCH,DELETE'"

  RestApiDefault5xxGatewayResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref RestApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: method.request.header.Origin
        gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Request-Id,x-api-key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,PATCH,DELETE'"

  SharedRuntimeLayer: # the Lambda Layer resource you defined in the template
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${ProjectName}-${StageName}-shared-runtime'
      ContentUri: dist/layers/shared-runtime/
      CompatibleRuntimes:
        - nodejs22.x
      PublishLambdaVersion: true
      RetentionPolicy: Retain

  RestApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - RestApiStage
    Properties:
      UsagePlanName: !Sub '${ProjectName}-${StageName}-usage-plan'
      Description: !Sub 'Usage plan for ${ProjectName}-${StageName}'
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref StageName

  RestApiUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ExistingApiKeyId
      KeyType: API_KEY
      UsagePlanId: !Ref RestApiUsagePlan

  SharedFunctionRole: # default app Lambda permissions, 
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${StageName}-shared'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole # basic Lambda logging
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole # required when Lambda attaches to a VPC
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDeadLetterQueue.Arn
        - PolicyName: !Sub '${ProjectName}-${StageName}-biometric-ml-access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-${StageName}-ml-inference'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-${StageName}-ml-inference:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/biometric/*'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'

  PetProfileFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${StageName}-pet-profile'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDeadLetterQueue.Arn
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-profile-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'

  PetRecoveryFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${StageName}-pet-recovery'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDeadLetterQueue.Arn
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-recovery-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'

  PetAnalysisFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${StageName}-pet-analysis'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDeadLetterQueue.Arn
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-analysis-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/breed_analysis/*'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/eye/*'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/profile/*'

  AuthorizerFunctionRole: # the IAM role for the authorizer Lambda only - RequestAuthorizerFunction
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${StageName}-authorizer'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-lambda-dlq'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt LambdaDeadLetterQueue.Arn

  RequestAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-request-authorizer'
      CodeUri: dist/functions/request-authorizer/
      Handler: index.handler
      Role: !GetAtt AuthorizerFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true
      AutoPublishCodeSha256: !Ref DeploymentFingerprint
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency

  PipelineSmokeFunction: # CI/CD smoke test example
    # - proves deployment pipeline works
    # - intentionally tiny and low-risk
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-pipeline-smoke'
      CodeUri: dist/functions/pipeline-smoke/
      Handler: index.handler
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true
      AutoPublishCodeSha256: !Ref DeploymentFingerprint
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Events:
        PipelineSmokeRootGET:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: GET
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        PipelineSmokeRootDELETE:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: DELETE
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        PipelineSmokeRootPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: POST
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPUT:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PUT
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPATCH:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PATCH
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-auth'
      CodeUri: dist/functions/auth/
      Handler: index.handler
      MemorySize: 512 # bcrypt + nodemailer are CPU-bound; 512 MB halves duration at same GB-s cost
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true
      AutoPublishCodeSha256: !Ref DeploymentFingerprint
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Environment:
        Variables:
          REFRESH_TOKEN_MAX_AGE_SEC: !Ref RefreshTokenMaxAgeSec
          REFRESH_RATE_LIMIT_LIMIT: !Ref RefreshRateLimitLimit
          REFRESH_RATE_LIMIT_WINDOW_SEC: !Ref RefreshRateLimitWindowSec
          REFRESH_COOKIE_SAME_SITE: !Ref RefreshCookieSameSite
          SMTP_HOST: !Ref AuthSmtpHost
          SMTP_PORT: !Ref AuthSmtpPort
          SMTP_USER: !Ref AuthSmtpUser
          SMTP_PASS: !Ref AuthSmtpPass
          SMTP_FROM: !Ref AuthSmtpFrom
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_VERIFY_SERVICE_SID: !Ref TwilioVerifyServiceSid
      Events:
        AuthChallengesPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/challenges
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        AuthChallengesOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/challenges
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        AuthChallengesVerifyPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/challenges/verify
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        AuthChallengesVerifyOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/challenges/verify
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        AuthLoginNgoPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/login/ngo
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        AuthLoginNgoOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/login/ngo
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        AuthRegistrationsUserPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/registrations/user
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        AuthRegistrationsUserOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/registrations/user
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        AuthRegistrationsNgoPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/registrations/ngo
            Method: POST
            Auth:
              Authorizer: NONE
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        AuthRegistrationsNgoOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/registrations/ngo
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        AuthTokensRefreshPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/tokens/refresh
            Method: POST
            Auth:
              Authorizer: NONE
        AuthTokensRefreshOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/tokens/refresh
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-user'
      CodeUri: dist/functions/user/
      Handler: index.handler
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true
      AutoPublishCodeSha256: !Ref DeploymentFingerprint
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Events:
        UserMeGET:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /user/me
            Method: GET
        UserMeDELETE:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /user/me
            Method: DELETE
        UserMePATCH:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /user/me
            Method: PATCH
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        UserMeOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /user/me
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false

  NgoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-ngo'
      CodeUri: dist/functions/ngo/
      Handler: index.handler
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
