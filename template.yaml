Globals: # shared default settings applied to all resources of a given type, unless a resource overrides them.
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    VpcConfig:
      SecurityGroupIds: !Ref LambdaSecurityGroupIds
      SubnetIds: !Ref LambdaSubnetIds
    Environment:
      Variables:
        PROJECT_NAME: !Ref ProjectName
        STAGE_NAME: !Ref StageName
        LAMBDA_ALIAS_NAME: !Ref LambdaAliasName
        CONFIG_NAMESPACE: !Ref ConfigNamespace
        NODE_ENV: !Ref StageName
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        MONGODB_URI: !Ref MongoDbUri
        AUTH_BYPASS: !Ref AuthBypass
        JWT_SECRET: !Ref JwtSecret

Resources:
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${ProjectName}-${StageName}'
      StageName: !Ref StageName
      EndpointConfiguration: REGIONAL
      ApiKeySourceType: HEADER
      Models: # request/response schemas, validates the request body before Lambda runs
        CreateWidgetRequest:
          type: object # body must be a JSON object
          additionalProperties: false # no extra unknown fields allowed
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 100
            description:
              type: string
              maxLength: 500
        GenericJsonObjectRequest:
          type: object
          additionalProperties: true
      Auth: # configure authorization behavior for the API or for a specific route
        ApiKeyRequired: true
        AddApiKeyRequiredToCorsPreflight: false
        DefaultAuthorizer: DddTokenAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          DddTokenAuthorizer:
            FunctionArn: !GetAtt RequestAuthorizerFunction.Arn # Amazon Resource Name
            Identity:
              Header: Authorization
              ValidationExpression: '^Bearer .+$'
              ReauthorizeEvery: 0

  SharedRuntimeLayer: # the Lambda Layer resource you defined in the template
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${ProjectName}-${StageName}-shared-runtime'
      ContentUri: dist/layers/shared-runtime/
      CompatibleRuntimes:
        - nodejs22.x
      PublishLambdaVersion: true
      RetentionPolicy: Retain

  RestApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - RestApiStage
    Properties:
      UsagePlanName: !Sub '${ProjectName}-${StageName}-usage-plan'
      Description: !Sub 'Usage plan for ${ProjectName}-${StageName}'
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref StageName

  RestApiUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ExistingApiKeyId
      KeyType: API_KEY
      UsagePlanId: !Ref RestApiUsagePlan

  SharedFunctionRole: # default app Lambda permissions, 
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns: 
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole # basic Lambda logging
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole # required when Lambda attaches to a VPC

  PetProfileFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-profile-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'

  PetRecoveryFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-recovery-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/pets/*'

  PetAnalysisFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-${StageName}-pet-analysis-s3-upload'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/user-uploads/*'

  AuthorizerFunctionRole: # the IAM role for the authorizer Lambda only - RequestAuthorizerFunction
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  RequestAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-request-authorizer'
      CodeUri: dist/functions/request-authorizer/
      Handler: index.handler
      Role: !GetAtt AuthorizerFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true

  PipelineSmokeFunction: # CI/CD smoke test example
    # - proves deployment pipeline works
    # - intentionally tiny and low-risk
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${StageName}-pipeline-smoke'
      CodeUri: dist/functions/pipeline-smoke/
      Handler: index.handler
      Role: !GetAtt SharedFunctionRole.Arn
      Layers:
        - !Ref SharedRuntimeLayer
      AutoPublishAlias: !Ref LambdaAliasName
      AutoPublishAliasAllProperties: true
      Events:
        PipelineSmokeRootGET:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: GET
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        PipelineSmokeRootDELETE:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: DELETE
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
        PipelineSmokeRootPOST:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: POST
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPUT:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PUT
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootPATCH:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: PATCH
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false
            RequestModel:
              Model: GenericJsonObjectRequest
              Required: false
              ValidateBody: true
        PipelineSmokeRootOPTIONS:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pipeline/smoke
            Method: OPTIONS
            Auth:
              Authorizer: NONE
              ApiKeyRequired: false

