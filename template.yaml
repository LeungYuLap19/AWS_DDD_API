Outputs: # expose useful values from the deployed stack after CloudFormation/SAM finishes
  # - “after deploy, show me these values”
  ApiUrl:
    Description: Base URL for the deployed REST API stage.
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'

  PipelineSmokeFunctionName:
    Description: Smoke-test Lambda function name.
    Value: !Ref PipelineSmokeFunction

  AuthorizerFunctionName:
    Description: Lambda authorizer function name.
    Value: !Ref RequestAuthorizerFunction

  SharedRuntimeLayerArn:
    Description: Shared runtime layer version ARN.
    Value: !Ref SharedRuntimeLayer

  LambdaAliasNameOut:
    Description: Alias published for every function via AutoPublishAlias.
    Value: !Ref LambdaAliasName
